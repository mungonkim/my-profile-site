<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Web Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-white">

    <!-- Header/Navigation -->
    <header class="fixed w-full top-0 z-50 bg-gray-800 shadow-lg">
        <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-start items-center">
            <div class="text-2xl font-bold bg-gradient-to-r from-orange-500 to-orange-600 bg-clip-text text-transparent">
                Portfolio
            </div>

            <ul class="hidden md:flex gap-8 ml-auto">
                <li><a href="#home" class="nav-link text-gray-300 hover:text-orange-400">Home</a></li>
                <li><a href="#about" class="nav-link text-gray-300 hover:text-orange-400">About</a></li>
                <li><a href="#skills" class="nav-link text-gray-300 hover:text-orange-400">Skills</a></li>
                <li><a href="#projects" class="nav-link text-gray-300 hover:text-orange-400">Projects</a></li>
                <li><a href="#contact" class="nav-link text-gray-300 hover:text-orange-400">Contact</a></li>
            </ul>

            <!-- Mobile Menu Button -->
            <button id="mobileMenuBtn" class="md:hidden text-gray-300 hover:text-orange-400 ml-auto">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </nav>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden bg-gray-800 border-t border-gray-700">
            <ul class="flex flex-col gap-4 px-4 py-4">
                <li><a href="#home" class="text-gray-300 hover:text-orange-400">Home</a></li>
                <li><a href="#about" class="text-gray-300 hover:text-orange-400">About</a></li>
                <li><a href="#skills" class="text-gray-300 hover:text-orange-400">Skills</a></li>
                <li><a href="#projects" class="text-gray-300 hover:text-orange-400">Projects</a></li>
                <li><a href="#contact" class="text-gray-300 hover:text-orange-400">Contact</a></li>
            </ul>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="home" class="section hero-gradient text-white pt-32 pb-20 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <div class="mb-6">
                <div class="w-32 h-32 mx-auto mb-6 rounded-full bg-white bg-opacity-20 border-4 border-white flex items-center justify-center">
                    <svg class="w-16 h-16 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                    </svg>
                </div>
            </div>

            <h1 id="hero-greeting" class="text-6xl md:text-7xl font-bold mb-4"></h1>
            <h2 id="hero-subtitle" class="text-4xl md:text-5xl font-semibold mb-6 text-blue-100"></h2>
            <p id="hero-bio" class="text-lg md:text-xl text-blue-100 mb-8 max-w-2xl mx-auto"></p>

            <div class="flex gap-8 justify-center flex-wrap">
                <a href="#projects" class="bg-orange-500 text-white px-8 py-3 rounded-lg font-semibold hover:bg-orange-600 transition shadow-lg">
                    포트폴리오 보기
                </a>
                <a href="#contact" class="border-2 border-orange-500 text-orange-500 px-8 py-3 rounded-lg font-semibold hover:bg-orange-500 hover:text-white transition">
                    연락하기
                </a>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section py-20 px-4 bg-gray-800">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-4xl font-bold text-center mb-12 text-white">소개</h2>

            <div class="grid md:grid-cols-2 gap-12 items-center">
                <div>
                    <div class="bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg p-8 h-80 flex items-center justify-center">
                        <svg class="w-40 h-40 text-white opacity-50" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM15.657 14.243a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM11 17a1 1 0 102 0v-1a1 1 0 10-2 0v1zM5.757 15.657a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707zM5 10a1 1 0 01-1-1V8a1 1 0 012 0v1a1 1 0 01-1 1zM5.757 5.757a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414l-.707-.707z"></path>
                        </svg>
                    </div>
                </div>

                <div>
                    <h3 id="about-heading" class="text-2xl font-bold text-white mb-4"></h3>
                    <p id="about-p1" class="text-gray-400 mb-4 leading-relaxed"></p>
                    <p id="about-p2" class="text-gray-400 mb-4 leading-relaxed"></p>
                    <p id="about-p3" class="text-gray-400 leading-relaxed"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="section py-20 px-4 bg-gray-900">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-4xl font-bold text-center mb-12 text-white">기술 스택</h2>

            <div class="grid md:grid-cols-2 gap-12">
                <div>
                    <h3 class="text-xl font-semibold text-white mb-6 flex items-center">
                        <span class="w-2 h-2 bg-orange-500 rounded-full mr-3"></span>
                        프론트엔드
                    </h3>
                    <div id="skills-frontend" class="flex flex-wrap gap-3"></div>
                </div>

                <div>
                    <h3 class="text-xl font-semibold text-white mb-6 flex items-center">
                        <span class="w-2 h-2 bg-orange-500 rounded-full mr-3"></span>
                        백엔드 &amp; 기타
                    </h3>
                    <div id="skills-backend" class="flex flex-wrap gap-3"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section py-20 px-4 bg-gray-800">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-4xl font-bold text-center mb-12 text-white">프로젝트</h2>
            <div id="projects-grid" class="grid md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section py-20 px-4 bg-gray-800">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-4xl font-bold mb-8 text-white">연락처</h2>
            <p id="contact-tagline" class="text-lg text-gray-400 mb-12 max-w-2xl mx-auto"></p>

            <div class="bg-gray-700 rounded-lg shadow-xl p-8 border-t-4 border-orange-500 mb-8">
                <div class="grid md:grid-cols-3 gap-8 mb-8">
                    <div>
                        <svg class="w-8 h-8 text-orange-500 mx-auto mb-4" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path>
                            <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path>
                        </svg>
                        <h3 class="font-semibold text-white mb-2">이메일</h3>
                        <a id="contact-email" href="#" class="text-orange-400 hover:text-orange-300 transition"></a>
                    </div>

                    <div>
                        <svg class="w-8 h-8 text-orange-500 mx-auto mb-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                        </svg>
                        <h3 class="font-semibold text-white mb-2">GitHub</h3>
                        <a id="contact-github" href="#" target="_blank" class="text-orange-400 hover:text-orange-300 transition"></a>
                    </div>

                    <div>
                        <svg class="w-8 h-8 text-orange-500 mx-auto mb-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                        </svg>
                        <h3 class="font-semibold text-white mb-2">LinkedIn</h3>
                        <a id="contact-linkedin" href="#" target="_blank" class="text-orange-400 hover:text-orange-300 transition"></a>
                    </div>
                </div>

                <div class="pt-8 border-t border-gray-600">
                    <a id="contact-email-btn" href="#" class="inline-block bg-gradient-to-r from-orange-500 to-orange-600 text-white px-8 py-3 rounded-lg font-semibold hover:shadow-lg transition">
                        이메일 보내기
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-16 px-4">
        <div class="max-w-6xl mx-auto text-center">
            <p class="text-gray-400 mb-4">© 2024 My Portfolio. All rights reserved.</p>
            <div class="flex justify-center gap-6 text-sm">
                <a href="#home" class="text-gray-400 hover:text-white transition">Home</a>
                <a href="#about" class="text-gray-400 hover:text-white transition">About</a>
                <a href="#projects" class="text-gray-400 hover:text-white transition">Projects</a>
                <a href="#contact" class="text-gray-400 hover:text-white transition">Contact</a>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
